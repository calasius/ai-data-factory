services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-synth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synth}
      POSTGRES_DB: ${POSTGRES_DB:-synthdata}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-synth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-synth}:${POSTGRES_PASSWORD:-synth}@postgres:5432/${POSTGRES_DB:-synthdata}
      REDIS_URL: redis://redis:6379/0
      PROJECTS_DIR: /data/projects
      TEMPLATES_DIR: /app/tools/templates
      COMMANDS_DIR: /app/.claude/commands
      # opencode + DeepSeek engine. The app starts its own internal opencode
      # server (self-contained); leave OPENCODE_BASE_URL unset unless using a sidecar.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      DEEPSEEK_EDIT_MODEL: ${DEEPSEEK_EDIT_MODEL:-deepseek-chat}
      OPENCODE_CONFIG_PATH: /app/api/opencode.json
    volumes:
      - projects_data:/data/projects
      - ./tools/templates:/app/tools/templates:ro,z
      - ./.claude/commands:/app/.claude/commands:ro,z
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  projects_data:
